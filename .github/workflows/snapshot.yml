name: Guardar HTML renderizado de Hianime

on:
  push:
  schedule:
    - cron: '*/30 * * * *'  # Cada 30 minutos
  workflow_dispatch:

jobs:
  render-html:
    runs-on: ubuntu-latest

    steps:
      - name: Clona el repositorio
        uses: actions/checkout@v4

      - name: Instala dependencias
        run: |
          npm ci

      - name: Instala Chromium para Puppeteer
        run: npx puppeteer install

      - name: Ejecuta script para renderizar HTML
        run: node snapshot.js

      # Fuentes obsoletas: HiAnime y AnimeOnegai
      # Las siguientes tareas están comentadas porque las páginas fuente
      # (HiAnime y AnimeOnegai) dejaron de estar disponibles.
      # Se mantienen aquí como referencia histórica y para posible reactivación
      # en caso de que vuelvan a funcionar.
      #
      # - name: Genera RSS de Hianime
      #   run: node generate-hianime-rss.js
      #
      # - name: Genera RSS de AnimeOnegai
      #   run: node generate-animeonegai-rss.js

      # Generadores activos
      - name: Genera RSS de WCO
        run: node generate-wcoflix-rss.js

      - name: Genera RSS de JkAnime
        run: node generate-jkanime-rss.js

      - name: Genera RSS de KAA (KickAssAnime)
        run: node generate-kaa-rss.js

      - name: Sube HTML y RSS generados
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add simulcast-wcoflix.html simulcast-kaa.html simulcast-jkanime.html docs/wco-rss.xml docs/jkanime-rss.xml docs/kaa-rss.xml
          git commit -m "Update simulcast.html y RSS [auto]" || echo "No changes to commit"
          git remote set-url origin https://x-access-token:${GIT_AUTH_TOKEN}@github.com/${{ github.repository }}
          git push
